<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slice It Up — Health Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf9f7;
    color: #1a1a1a;
    padding: 2rem;
  }
  .app { max-width: 480px; margin: 0 auto; }
  .topbar {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 1rem; margin-bottom: 1.5rem;
    border-bottom: 1px solid #e8e5df;
  }
  .topbar h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
  .topbar p { font-size: 13px; color: #888; margin-top: 2px; }
  .back-link { font-size: 13px; color: #888; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .back-link:hover { color: #555; }

  .card { background: #fff; border: 1px solid #e8e5df; border-radius: 10px; overflow: hidden; }
  .card-header {
    background: #534AB7; padding: 0.75rem 1.25rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-header h2 { font-size: 15px; font-weight: 500; color: #fff; }
  .add-btn {
    font-size: 12px; color: rgba(255,255,255,0.85); background: none; border: none;
    cursor: pointer; font-family: inherit;
  }
  .card-body { padding: 1rem 1.25rem; }

  .section-label {
    font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.6rem;
  }

  .event-row { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid #f0ede8; }
  .event-row:last-child { border-bottom: none; }
  .event-dot { width: 7px; height: 7px; border-radius: 50%; background: #AFA9EC; margin-top: 5px; flex-shrink: 0; }
  .event-name { font-size: 13px; font-weight: 500; }
  .event-date { font-size: 11px; color: #999; margin-top: 1px; }
  .event-notes { font-size: 12px; color: #888; margin-top: 2px; }
  .delete-x { font-size: 12px; color: #ccc; cursor: pointer; padding: 0 4px; margin-left: auto; }
  .delete-x:hover { color: #E24B4A; }

  .empty-state { font-size: 13px; color: #999; text-align: center; padding: 1rem 0; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    align-items: center; justify-content: center; z-index: 10;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; padding: 1.5rem; width: 320px; }
  .modal h3 { font-size: 15px; margin-bottom: 1rem; }
  .modal label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea {
    width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px;
    font-family: inherit;
  }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
  .modal-actions button {
    font-size: 13px; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit;
  }
  .btn-cancel { background: #f0ede8; color: #555; }
  .btn-save { background: #534AB7; color: #fff; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div>
      <h1>Slice it up</h1>
      <p id="today-date"></p>
    </div>
    <a class="back-link" href="index.html">← Dashboard</a>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Health Tracker</h2>
      <button class="add-btn" onclick="openModal()">+ event</button>
    </div>
    <div class="card-body">
      <div class="section-label">All events</div>
      <div id="event-list">
        <div class="empty-state">Loading...</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Add a health event</h3>
    <label>Event name</label>
    <input type="text" id="event-name" placeholder="e.g. Started Vitamin D, Hair color, Haircut">
    <label>Date</label>
    <input type="date" id="event-date">
    <label>Notes (optional)</label>
    <textarea id="event-notes" rows="2" placeholder="Any extra detail"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://xybbihonrxuswlkhloyd.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5YmJpaG9ucnh1c3dsa2hsb3lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzYxOTAsImV4cCI6MjA5NzIxMjE5MH0.549JALOdaUPJF5NhjG_IVQBUdPvJu5tKWiKOMTr-_Is";

  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json"
  };

  document.getElementById("today-date").textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById("event-date").value = todayStr();

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    // dateStr is YYYY-MM-DD
    const [y,m,d] = dateStr.split("-").map(Number);
    const dt = new Date(y, m-1, d);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  async function loadEvents() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/health_tracker?select=*&order=event_date.desc`,
      { headers }
    );
    const events = await res.json();
    const listEl = document.getElementById("event-list");

    if (!events.length) {
      listEl.innerHTML = `<div class="empty-state">No events logged yet — click "+ event" to add one.</div>`;
      return;
    }

    listEl.innerHTML = events.map(ev => `
      <div class="event-row">
        <div class="event-dot"></div>
        <div style="flex:1">
          <div class="event-name">${escapeHtml(ev.event_name)}</div>
          <div class="event-date">${formatDate(ev.event_date)}</div>
          ${ev.notes ? `<div class="event-notes">${escapeHtml(ev.notes)}</div>` : ""}
        </div>
        <div class="delete-x" onclick="deleteEvent(${ev.id})">✕</div>
      </div>
    `).join("");
  }

  function openModal() {
    document.getElementById("modal-overlay").classList.add("open");
  }
  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    document.getElementById("event-name").value = "";
    document.getElementById("event-notes").value = "";
    document.getElementById("event-date").value = todayStr();
  }

  async function saveEvent() {
    const name = document.getElementById("event-name").value.trim();
    const date = document.getElementById("event-date").value;
    const notes = document.getElementById("event-notes").value.trim();
    if (!name || !date) return;

    await fetch(`${SUPABASE_URL}/rest/v1/health_tracker`, {
      method: "POST",
      headers,
      body: JSON.stringify({ event_name: name, event_date: date, notes: notes || null })
    });

    closeModal();
    loadEvents();
  }

  async function deleteEvent(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/health_tracker?id=eq.${id}`, {
      method: "DELETE",
      headers
    });
    loadEvents();
  }

  loadEvents();
</script>

</body>
</html>
