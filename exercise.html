<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slice It Up — Exercise</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf9f7;
    color: #1a1a1a;
    padding: 2rem;
  }
  .app { max-width: 480px; margin: 0 auto; }
  .topbar {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 1rem; margin-bottom: 1.5rem;
    border-bottom: 1px solid #e8e5df;
  }
  .topbar h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.3px; }
  .topbar p { font-size: 13px; color: #888; margin-top: 2px; }

  .card { background: #fff; border: 1px solid #e8e5df; border-radius: 10px; overflow: hidden; margin-bottom: 1.25rem; }
  .card-header {
    background: #0F6E56; padding: 0.75rem 1.25rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-header h2 { font-size: 15px; font-weight: 500; color: #fff; }
  .card-body { padding: 1rem 1.25rem; }

  .section-label {
    font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.6rem;
  }

  .exercise-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid #f0ede8;
  }
  .exercise-row:last-child { border-bottom: none; }
  .check {
    width: 19px; height: 19px; border-radius: 5px; border: 1px solid #ccc;
    flex-shrink: 0; cursor: pointer; background: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 12px; color: #0F6E56;
  }
  .check.done { background: #E1F5EE; border-color: #5DCAA5; }
  .exercise-label { font-size: 14px; flex: 1; }
  .exercise-meta { font-size: 12px; color: #aaa; }

  .walk-input-wrap { display: flex; align-items: center; gap: 6px; }
  .walk-input {
    width: 60px; font-size: 13px; padding: 5px 8px; border: 1px solid #ddd;
    border-radius: 6px; background: #f7f6f3; text-align: right; font-family: inherit;
  }
  .walk-unit { font-size: 12px; color: #999; }

  .month-link {
    display: block; margin-top: 0.75rem; padding-top: 0.75rem;
    border-top: 1px solid #f0ede8; font-size: 13px; color: #0F6E56;
    text-decoration: none; text-align: center; cursor: pointer;
  }

  .save-note {
    font-size: 11px; color: #5DCAA5; text-align: center; margin-top: 8px; height: 14px;
  }

  /* Monthly view */
  .month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 0.5rem;
  }
  .day-cell {
    aspect-ratio: 1; background: #f7f6f3; border-radius: 6px; padding: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 10px; position: relative;
  }
  .day-cell.has-otf { background: #E1F5EE; }
  .day-num { font-size: 10px; color: #999; position: absolute; top: 3px; left: 4px; }
  .day-miles { font-size: 11px; font-weight: 600; color: #185FA5; margin-top: 6px; }
  .day-otf-dot { width: 7px; height: 7px; border-radius: 50%; background: #0F6E56; margin-top: 2px; }
  .totals-row { display: flex; gap: 12px; margin-top: 1rem; }
  .total-box { flex: 1; background: #f7f6f3; border-radius: 8px; padding: 10px; text-align: center; }
  .total-num { font-size: 22px; font-weight: 600; color: #0F6E56; }
  .total-label { font-size: 11px; color: #999; margin-top: 2px; }
  .back-link { font-size: 13px; color: #888; cursor: pointer; margin-bottom: 1rem; display: inline-block; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div>
      <h1>Slice it up</h1>
      <p id="today-date"></p>
    </div>
  </div>

  <!-- TODAY VIEW -->
  <div id="today-view">
    <div class="card">
      <div class="card-header">
        <h2>Exercise</h2>
      </div>
      <div class="card-body">
        <div class="section-label" id="day-label">Today</div>

        <div class="exercise-row">
          <div class="check" id="otf-check" onclick="toggleOTF()"></div>
          <span class="exercise-label">OrangeTheory</span>
          <span class="exercise-meta" id="otf-meta"></span>
        </div>

        <div class="exercise-row">
          <div class="check" id="walk-check"></div>
          <span class="exercise-label">Walking</span>
          <div class="walk-input-wrap">
            <input type="number" class="walk-input" id="miles-input" min="0" step="0.1" value="0" onchange="saveMiles()">
            <span class="walk-unit">miles</span>
          </div>
        </div>

        <div class="exercise-row">
          <div class="check" id="stretch-check" onclick="toggleStretch()"></div>
          <span class="exercise-label">Stretching</span>
          <span class="exercise-meta"></span>
        </div>

        <div class="save-note" id="save-note"></div>

        <a class="month-link" onclick="showMonth()">View this month →</a>
      </div>
    </div>
  </div>

  <!-- MONTH VIEW -->
  <div id="month-view" class="hidden">
    <a class="back-link" onclick="showToday()">← Back to today</a>
    <div class="card">
      <div class="card-header">
        <h2 id="month-title">This Month</h2>
      </div>
      <div class="card-body">
        <div class="month-grid" id="month-grid"></div>
        <div class="totals-row">
          <div class="total-box">
            <div class="total-num" id="total-otf">0</div>
            <div class="total-label">OTF sessions</div>
          </div>
          <div class="total-box">
            <div class="total-num" id="total-miles">0</div>
            <div class="total-label">miles walked</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://xybbihonrxuswlkhloyd.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5YmJpaG9ucnh1c3dsa2hsb3lkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzYxOTAsImV4cCI6MjA5NzIxMjE5MH0.549JALOdaUPJF5NhjG_IVQBUdPvJu5tKWiKOMTr-_Is";

  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": `Bearer ${SUPABASE_KEY}`,
    "Content-Type": "application/json"
  };

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  document.getElementById("today-date").textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById("day-label").textContent =
    "Today — " + new Date().toLocaleDateString('en-US', { weekday: 'long' });

  let todayRow = null;

  async function loadToday() {
    const date = todayStr();
    const res = await fetch(`${SUPABASE_URL}/rest/v1/exercise_log?log_date=eq.${date}&select=*`, { headers });
    const rows = await res.json();
    todayRow = rows[0] || null;

    const otfDone = todayRow?.orangetheory || false;
    const stretchDone = todayRow?.stretching || false;
    const miles = todayRow?.walking_miles || 0;

    document.getElementById("otf-check").classList.toggle("done", otfDone);
    document.getElementById("otf-check").innerHTML = otfDone ? "✓" : "";
    document.getElementById("otf-meta").textContent = otfDone ? "done" : "";

    document.getElementById("stretch-check").classList.toggle("done", stretchDone);
    document.getElementById("stretch-check").innerHTML = stretchDone ? "✓" : "";

    document.getElementById("miles-input").value = miles;
    document.getElementById("walk-check").classList.toggle("done", miles > 0);
    document.getElementById("walk-check").innerHTML = miles > 0 ? "✓" : "";
  }

  async function upsertToday(fields) {
    const date = todayStr();
    if (todayRow) {
      await fetch(`${SUPABASE_URL}/rest/v1/exercise_log?id=eq.${todayRow.id}`, {
        method: "PATCH", headers, body: JSON.stringify(fields)
      });
    } else {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/exercise_log`, {
        method: "POST",
        headers: { ...headers, "Prefer": "return=representation" },
        body: JSON.stringify({ log_date: date, ...fields })
      });
      const data = await res.json();
      todayRow = data[0];
    }
    flashSaved();
  }

  function flashSaved() {
    const note = document.getElementById("save-note");
    note.textContent = "Saved";
    setTimeout(() => note.textContent = "", 1200);
  }

  async function toggleOTF() {
    const newVal = !(todayRow?.orangetheory || false);
    await upsertToday({ orangetheory: newVal });
    loadToday();
  }

  async function toggleStretch() {
    const newVal = !(todayRow?.stretching || false);
    await upsertToday({ stretching: newVal });
    loadToday();
  }

  async function saveMiles() {
    const val = parseFloat(document.getElementById("miles-input").value) || 0;
    await upsertToday({ walking_miles: val });
    loadToday();
  }

  // ---- MONTH VIEW ----
  function showMonth() {
    document.getElementById("today-view").classList.add("hidden");
    document.getElementById("month-view").classList.remove("hidden");
    loadMonth();
  }
  function showToday() {
    document.getElementById("month-view").classList.add("hidden");
    document.getElementById("today-view").classList.remove("hidden");
  }

  async function loadMonth() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth(); // 0-indexed
    const monthName = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    document.getElementById("month-title").textContent = monthName;

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startStr = firstDay.toISOString().slice(0,10);
    const endStr = lastDay.toISOString().slice(0,10);

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/exercise_log?log_date=gte.${startStr}&log_date=lte.${endStr}&select=*`,
      { headers }
    );
    const rows = await res.json();
    const byDate = {};
    rows.forEach(r => byDate[r.log_date] = r);

    const grid = document.getElementById("month-grid");
    grid.innerHTML = "";

    // blank cells for days before month starts
    const startWeekday = firstDay.getDay();
    for (let i = 0; i < startWeekday; i++) {
      grid.innerHTML += `<div></div>`;
    }

    let totalOTF = 0;
    let totalMiles = 0;

    for (let d = 1; d <= lastDay.getDate(); d++) {
      const dateStr = year + "-" + String(month+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      const row = byDate[dateStr];
      const otf = row?.orangetheory || false;
      const miles = row?.walking_miles || 0;
      if (otf) totalOTF++;
      totalMiles += miles;

      grid.innerHTML += `
        <div class="day-cell ${otf ? 'has-otf' : ''}">
          <span class="day-num">${d}</span>
          ${otf ? '<div class="day-otf-dot"></div>' : ''}
          ${miles > 0 ? `<div class="day-miles">${miles}mi</div>` : ''}
        </div>
      `;
    }

    document.getElementById("total-otf").textContent = totalOTF;
    document.getElementById("total-miles").textContent = totalMiles.toFixed(1);
  }

  loadToday();
</script>

</body>
</html>
